syntax = "proto3";

package sso.v3;

option go_package = "github.com/rwrrioe/protos/v3/gen/go/;ssov3";

service Auth {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc IsAdmin (IsAdminRequest) returns (IsAdminResponse);
  rpc RegenerateToken(RegenerateTokenRequest) returns (RegenerateTokenResponse);
  rpc CreateNewPassword(CreateNewPasswordRequest) returns (CreateNewPasswordResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
}

service Code {
  rpc SendCode(SendCodeRequest) returns (SendCodeResponse);
  rpc VerifyCode(VerifyCodeRequest) returns (VerifyCodeResponse);
}

// Auth messages

message LoginRequest {
  string email = 1;
  string password = 2;
  int32 app_id = 3;
}

message LoginResponse {
  string accToken = 1;
  string refToken = 2;
}

message RegisterRequest {
    string email = 1; 
    string password = 2; 
  }
  
  message RegisterResponse {
    string user_id = 1;
  }

message IsAdminRequest {
  string user_id = 1;
}

message IsAdminResponse {
  bool is_admin = 1;
}

message RegenerateTokenRequest {
  string refToken = 1;
}

message RegenerateTokenResponse {
  string accToken = 1;
  string refToken = 2;
}

message LogoutRequest {
  string refToken = 1;
}

message LogoutResponse {}

message CreateNewPasswordRequest {
  string resetToken = 1;
  string email = 2;
  string password = 3;

}

message CreateNewPasswordResponse {}


// Code messages

message SendCodeRequest {
  string email = 1;
}

message SendCodeResponse {}

message VerifyCodeRequest {
  string email = 1;
  string code = 2;
}

message VerifyCodeResponse {
  string resetToken = 1;
}